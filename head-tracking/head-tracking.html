<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head Tracking Parallax</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    color: #37352f;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 20px;
  }

  /* ── Parallax scene (centered) ── */
  #scene {
    position: relative;
    width: 640px;
    aspect-ratio: 16 / 9;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(55,53,47,0.09);
    background: #0b0e17;
    will-change: transform;
    transform-style: preserve-3d;
  }
  .layer {
    position: absolute;
    left: -80px; top: -50px;
    width: calc(100% + 160px);
    height: calc(100% + 100px);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    will-change: transform;
  }

  /* ── Camera preview (bottom-right of scene) ── */
  #cam-preview {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 140px;
    aspect-ratio: 4 / 3;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 10;
    background: #000;
  }
  #cam-preview video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #cam-preview canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
  }

  /* ── HUD (Notion property style below scene) ── */
  #hud {
    margin-top: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 640px;
    width: 100%;
  }
  .prop-group {
    flex: 1;
    min-width: 260px;
  }
  .group-title {
    font-size: .75rem;
    font-weight: 600;
    color: #9b9a97;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(55,53,47,0.09);
    margin-bottom: 2px;
  }
  .prop-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 3px;
  }
  .prop-row:hover {
    background: rgba(55,53,47,0.04);
  }
  .prop-row .label {
    font-size: .8125rem;
    color: #9b9a97;
  }
  .prop-row .value {
    font-size: .9375rem;
    font-weight: 500;
    color: #37352f;
    font-variant-numeric: tabular-nums;
  }
  .prop-row.has-map {
    padding: 8px;
    gap: 12px;
  }
  .prop-row.has-map:hover { background: none; }
  .map-values {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .map-values .prop-row { padding: 2px 0; }

  /* ── Position map ── */
  #posmap {
    width: 100px; height: 56px;
    background: #f7f6f3;
    border: 1px solid rgba(55,53,47,0.09);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  #posmap .crosshair-h, #posmap .crosshair-v {
    position: absolute; background: rgba(55,53,47,0.06);
  }
  #posmap .crosshair-h { width: 100%; height: 1px; top: 50%; }
  #posmap .crosshair-v { height: 100%; width: 1px; left: 50%; }
  #posdot {
    width: 7px; height: 7px;
    background: #2eaadc;
    border-radius: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
    transition: left .08s ease-out, top .08s ease-out;
  }

  /* ── Intensity slider ── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
  }
  .slider-row .label {
    font-size: .8125rem;
    color: #9b9a97;
    flex-shrink: 0;
  }
  .slider-row .value {
    font-size: .8125rem;
    font-weight: 500;
    color: #37352f;
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #intensitySlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(55,53,47,0.09);
    border-radius: 2px;
    outline: none;
  }
  #intensitySlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #37352f;
    border-radius: 50%;
    cursor: pointer;
  }

  #status {
    margin-top: 16px;
    font-size: .8125rem;
    color: #9b9a97;
    transition: color .2s ease-out;
  }

  @media (prefers-reduced-motion: reduce) {
    #posdot { transition: none; }
  }
  @media (max-width: 680px) {
    #scene { width: 100%; }
  }
</style>
</head>
<body>

<!-- Parallax scene with camera preview inside -->
<div id="scene">
  <div class="layer" data-depth="0"  style="background-image:url(assets/10_Sky.png)"></div>
  <div class="layer" data-depth="8"  style="background-image:url(assets/09_Forest.png)"></div>
  <div class="layer" data-depth="16" style="background-image:url(assets/08_Forest.png)"></div>
  <div class="layer" data-depth="26" style="background-image:url(assets/07_Forest.png)"></div>
  <div class="layer" data-depth="36" style="background-image:url(assets/06_Forest.png)"></div>
  <div class="layer" data-depth="44" style="background-image:url(assets/05_Particles.png)"></div>
  <div class="layer" data-depth="54" style="background-image:url(assets/04_Forest.png)"></div>
  <div class="layer" data-depth="62" style="background-image:url(assets/03_Particles.png)"></div>
  <div class="layer" data-depth="72" style="background-image:url(assets/02_Bushes.png)"></div>
  <div class="layer" data-depth="80" style="background-image:url(assets/01_Mist.png)"></div>

  <div id="cam-preview">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="prop-group">
    <div class="group-title">Position</div>
    <div class="prop-row has-map">
      <div id="posmap">
        <div class="crosshair-h"></div>
        <div class="crosshair-v"></div>
        <div id="posdot"></div>
      </div>
      <div class="map-values">
        <div class="prop-row">
          <span class="label">X</span>
          <span class="value" id="posXVal">—</span>
        </div>
        <div class="prop-row">
          <span class="label">Y</span>
          <span class="value" id="posYVal">—</span>
        </div>
        <div class="prop-row">
          <span class="label">Size</span>
          <span class="value" id="sizeVal">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="prop-group">
    <div class="group-title">Orientation</div>
    <div class="prop-row">
      <span class="label">Yaw</span>
      <span class="value" id="yawVal">—</span>
    </div>
    <div class="prop-row">
      <span class="label">Pitch</span>
      <span class="value" id="pitchVal">—</span>
    </div>
    <div class="prop-row">
      <span class="label">Roll</span>
      <span class="value" id="rollVal">—</span>
    </div>
    <div class="prop-row">
      <span class="label">FPS</span>
      <span class="value" id="fpsVal">—</span>
    </div>
    <div style="border-top:1px solid rgba(55,53,47,0.09); margin-top:6px; padding-top:6px;">
      <div class="slider-row">
        <span class="label">Intensity</span>
        <input type="range" id="intensitySlider" min="0" max="200" value="100">
        <span class="value" id="intensityVal">100%</span>
      </div>
    </div>
  </div>
</div>

<div id="status" role="status" aria-live="polite">Initializing camera…</div>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const videoEl  = document.getElementById('video');
const canvasEl = document.getElementById('canvas');
const ctx      = canvasEl.getContext('2d');
const statusEl = document.getElementById('status');

const posXVal  = document.getElementById('posXVal');
const posYVal  = document.getElementById('posYVal');
const sizeVal  = document.getElementById('sizeVal');
const posDot   = document.getElementById('posdot');

const yawEl    = document.getElementById('yawVal');
const pitchEl  = document.getElementById('pitchVal');
const rollEl   = document.getElementById('rollVal');
const fpsEl    = document.getElementById('fpsVal');

/* ── Parallax ────────────────────────────────────────── */
const sceneEl = document.getElementById('scene');
const layers  = document.querySelectorAll('.layer');
let smoothX = 0, smoothY = 0, smoothZ = 0;
let lastHeadX = 50, lastHeadY = 50;
let lastHeadSize = 0;   // face area %, 0 = not yet calibrated
let baseHeadSize = 0;   // calibrated "neutral" face size
let intensity = 1.0;

const intensitySlider = document.getElementById('intensitySlider');
const intensityVal    = document.getElementById('intensityVal');
intensitySlider.addEventListener('input', () => {
  intensity = intensitySlider.value / 100;
  intensityVal.textContent = intensitySlider.value + '%';
});

function animateParallax() {
  const targetX = (lastHeadX - 50) / 50;
  const targetY = (lastHeadY - 50) / 50;
  // Z: how much closer/farther than calibrated position (positive = closer = zoom in)
  const targetZ = baseHeadSize > 0 ? (lastHeadSize - baseHeadSize) / baseHeadSize : 0;

  smoothX += (targetX - smoothX) * 0.18;
  smoothY += (targetY - smoothY) * 0.18;
  smoothZ += (targetZ - smoothZ) * 0.12;  // slower smoothing for zoom

  sceneEl.style.transform = '';

  layers.forEach(layer => {
    const depth = parseFloat(layer.dataset.depth) * intensity;
    const tx = -smoothX * depth;
    const ty = -smoothY * depth * 0.3;
    // Closer layers scale more when head moves forward/back
    const depthNorm = depth / 80;  // normalize depth to 0–1
    const scale = 1 + smoothZ * 0.3 * (1 + depthNorm) * intensity;
    layer.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale(${scale})`;
  });

  requestAnimationFrame(animateParallax);
}
requestAnimationFrame(animateParallax);

/* ── FPS counter ────────────────────────────────────── */
let frameCount = 0, lastFpsTime = performance.now();
function tickFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsEl.textContent = frameCount;
    frameCount = 0;
    lastFpsTime = now;
  }
}

/* ── Key landmark indices (468-point mesh) ──────────── */
const NOSE_TIP        = 1;
const FOREHEAD        = 10;
const CHIN            = 152;
const LEFT_EYE_OUTER  = 263;
const RIGHT_EYE_OUTER = 33;

/* ── Head POSITION ──────────────────────────────────── */
function computePosition(landmarks, w, h) {
  let minX = Infinity, maxX = -Infinity;
  let minY = Infinity, maxY = -Infinity;

  for (const p of landmarks) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }

  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const bw = (maxX - minX) * w;
  const bh = (maxY - minY) * h;

  return { cx, cy, bw, bh, minX, minY, maxX, maxY };
}

/* ── Head ORIENTATION ───────────────────────────────── */
function estimatePose(landmarks, w, h) {
  const nose     = landmarks[NOSE_TIP];
  const chin     = landmarks[CHIN];
  const forehead = landmarks[FOREHEAD];
  const leftEye  = landmarks[LEFT_EYE_OUTER];
  const rightEye = landmarks[RIGHT_EYE_OUTER];

  const midX = (leftEye.x + rightEye.x) / 2;
  const midY = (leftEye.y + rightEye.y) / 2;

  const eyeDist = Math.hypot(
    (leftEye.x - rightEye.x) * w,
    (leftEye.y - rightEye.y) * h
  );

  const yawRaw = (nose.x - midX) * w / (eyeDist || 1);
  const yaw = Math.atan2(yawRaw, 1) * (180 / Math.PI);

  const faceHeight = Math.hypot(
    (forehead.x - chin.x) * w,
    (forehead.y - chin.y) * h
  );
  const pitchRaw = (nose.y - midY) * h / (faceHeight * 0.5 || 1);
  const pitch = Math.atan2(pitchRaw, 1) * (180 / Math.PI) - 10;

  const roll = Math.atan2(
    (rightEye.y - leftEye.y) * h,
    (rightEye.x - leftEye.x) * w
  ) * (180 / Math.PI);

  return { yaw: -yaw, pitch: -pitch, roll };
}

/* ── Draw helpers ───────────────────────────────────── */
const FACE_OVAL      = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,10];
const LEFT_EYE_PATH  = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398,362];
const RIGHT_EYE_PATH = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246,33];
const LIPS_OUTER     = [61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,61];

function drawConnectors(landmarks, indices, color, lineWidth) {
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  for (let i = 0; i < indices.length; i++) {
    const p = landmarks[indices[i]];
    const x = p.x * canvasEl.width;
    const y = p.y * canvasEl.height;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawMesh(landmarks) {
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (const p of landmarks) {
    ctx.fillRect(p.x * canvasEl.width - 0.5, p.y * canvasEl.height - 0.5, 1, 1);
  }
  const wireColor = 'rgba(255,255,255,0.25)';
  drawConnectors(landmarks, FACE_OVAL, wireColor, 1);
  drawConnectors(landmarks, LEFT_EYE_PATH, wireColor, 0.8);
  drawConnectors(landmarks, RIGHT_EYE_PATH, wireColor, 0.8);
  drawConnectors(landmarks, LIPS_OUTER, wireColor, 0.8);

  ctx.fillStyle = 'rgba(46,170,220,0.6)';
  for (const idx of [NOSE_TIP, FOREHEAD, CHIN, LEFT_EYE_OUTER, RIGHT_EYE_OUTER]) {
    const p = landmarks[idx];
    ctx.beginPath();
    ctx.arc(p.x * canvasEl.width, p.y * canvasEl.height, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ── MediaPipe Face Mesh setup ─────────────────────── */
const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

faceMesh.onResults((results) => {
  tickFps();
  const w = canvasEl.width, h = canvasEl.height;
  ctx.clearRect(0, 0, w, h);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const landmarks = results.multiFaceLandmarks[0];

    drawMesh(landmarks);

    const pos = computePosition(landmarks, w, h);

    const displayX = (1 - pos.cx) * 100;
    const displayY = pos.cy * 100;
    const sizePercent = (pos.bw * pos.bh) / (w * h) * 100;

    // Drive parallax
    lastHeadX = displayX;
    lastHeadY = displayY;
    lastHeadSize = sizePercent;
    if (baseHeadSize === 0) baseHeadSize = sizePercent;  // calibrate on first detection

    posXVal.textContent = displayX.toFixed(1) + '%';
    posYVal.textContent = displayY.toFixed(1) + '%';
    sizeVal.textContent = sizePercent.toFixed(1) + '%';

    posDot.style.left = displayX + '%';
    posDot.style.top  = displayY + '%';

    const pose = estimatePose(landmarks, w, h);

    yawEl.textContent   = pose.yaw.toFixed(1) + '\u00B0';
    pitchEl.textContent = pose.pitch.toFixed(1) + '\u00B0';
    rollEl.textContent  = pose.roll.toFixed(1) + '\u00B0';

    statusEl.textContent = 'Tracking active';
    statusEl.style.color = '#0f7b6c';
  } else {
    posXVal.textContent = posYVal.textContent = sizeVal.textContent = '—';
    yawEl.textContent = pitchEl.textContent = rollEl.textContent = '—';
    posDot.style.left = '50%';
    posDot.style.top  = '50%';
    statusEl.textContent = 'No face detected';
    statusEl.style.color = '#9b9a97';
  }
});

/* ── Camera start ──────────────────────────────────── */
async function start() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    canvasEl.width  = videoEl.videoWidth;
    canvasEl.height = videoEl.videoHeight;

    statusEl.textContent = 'Loading Face Mesh model…';

    const camera = new Camera(videoEl, {
      onFrame: async () => {
        await faceMesh.send({ image: videoEl });
      },
      width: 640,
      height: 480
    });
    camera.start();
  } catch (err) {
    statusEl.textContent = 'Camera error: ' + err.message;
    statusEl.style.color = '#e16259';
    console.error(err);
  }
}

start();
</script>
</body>
</html>
